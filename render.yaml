services:
  - type: web
    name: antidoping-hub
    env: node
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @workspace/antidoping run build
    startCommand: node_modules/.bin/serve -s artifacts/antidoping/dist/public -l $PORT
    envVars:
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
