services:
  - type: web
    name: antidoping-hub
    env: node
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @workspace/antidoping run build
    startCommand: pnpm --filter @workspace/antidoping run start
    envVars:
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: NODE_ENV
        value: production
