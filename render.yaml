services:
  - type: web
    name: antidoping-hub
    env: static
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @workspace/antidoping run build
    staticPublishPath: artifacts/antidoping/dist/public
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
